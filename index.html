<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQQ Holdings Tracker</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --muted: #7b82a0;
    --green: #00c896;
    --green-dim: rgba(0,200,150,0.12);
    --red: #ff4d6a;
    --red-dim: rgba(255,77,106,0.12);
    --accent: #4f8eff;
    --accent-dim: rgba(79,142,255,0.12);
    --font: 'DM Mono', 'Fira Code', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; min-height: 100vh; }
  header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap; }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .logo span { color: var(--accent); }
  .qqq-price { font-size: 28px; font-weight: 700; }
  .qqq-chg { font-size: 14px; margin-left: 8px; }
  .header-meta { font-size: 11px; color: var(--muted); margin-left: auto; line-height: 1.6; text-align: right; }
  .toolbar { display: flex; align-items: center; gap: 10px; padding: 14px 24px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 12px; padding: 7px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: var(--bg3); border-color: rgba(255,255,255,0.18); }
  .btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .btn-refresh { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .btn-refresh:hover { background: rgba(79,142,255,0.22); }
  select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 12px; padding: 7px 12px; border-radius: 6px; cursor: pointer; outline: none; }
  .status { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid; white-space: nowrap; }
  .status.idle { color: var(--muted); border-color: var(--border); background: var(--bg2); }
  .status.loading { color: #ffd060; border-color: rgba(255,208,96,0.3); background: rgba(255,208,96,0.08); }
  .status.ok { color: var(--green); border-color: rgba(0,200,150,0.3); background: var(--green-dim); }
  .status.err { color: var(--red); border-color: rgba(255,77,106,0.3); background: var(--red-dim); }
  .ts { font-size: 11px; color: var(--muted); margin-left: auto; }
  .search-wrap { position: relative; }
  .search-wrap input { background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 12px; padding: 7px 12px 7px 28px; border-radius: 6px; width: 160px; outline: none; }
  .search-wrap input:focus { border-color: var(--accent); }
  .si { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 11px; pointer-events: none; }
  .summary { display: grid; grid-template-columns: repeat(5,1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .s-card { background: var(--bg); padding: 14px 20px; }
  .s-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .s-val { font-size: 20px; font-weight: 700; }
  .s-val.up { color: var(--green); }
  .s-val.dn { color: var(--red); }
  .s-val.neu { color: var(--muted); }
  #table-view { max-height: calc(100vh - 280px); overflow-y: auto; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 660px; }
  thead th { padding: 10px 16px; text-align: left; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; position: sticky; top: 0; background: var(--bg); }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  thead th:not(:first-child) { text-align: right; }
  thead th:last-child { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--bg2); }
  tbody td { padding: 9px 16px; }
  tbody td:not(:first-child):not(:last-child) { text-align: right; }
  .rank { color: var(--muted); font-size: 10px; margin-right: 5px; }
  .ticker-text { font-weight: 700; font-size: 14px; }
  .name { color: var(--muted); font-size: 11px; }
  .wbar { display: inline-block; height: 3px; background: var(--accent); border-radius: 2px; opacity: 0.45; vertical-align: middle; margin-left: 6px; }
  .chg-pos { color: var(--green); font-weight: 700; }
  .chg-neg { color: var(--red); font-weight: 700; }
  .chg-neu { color: var(--muted); }
  .bar-wrap { display: flex; align-items: center; gap: 6px; min-width: 80px; }
  .bar-track { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .skel { display: inline-block; width: 56px; height: 11px; background: var(--bg3); border-radius: 3px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.6}50%{opacity:0.2} }
  #map-view { padding: 16px 24px; }
  #treemap-canvas { width: 100%; display: block; border-radius: 8px; }
  .map-legend { display: flex; gap: 20px; align-items: center; font-size: 11px; color: var(--muted); margin-bottom: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-sw { width: 12px; height: 12px; border-radius: 2px; }
  .note { font-size: 10px; color: var(--muted); padding: 8px 24px; border-top: 1px solid var(--border); }
  @media (max-width:600px) { .summary { grid-template-columns: repeat(3,1fr); } .qqq-price { font-size: 20px; } }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">QQQ <span>Holdings</span></div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px;">Invesco QQQ Trust — Top 50 holdings</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:4px;">
    <span class="qqq-price" id="qqq-price">—</span>
    <span class="qqq-chg" id="qqq-chg"></span>
  </div>
  <div class="header-meta" id="header-meta">Presioná Actualizar para cargar precios</div>
</header>

<div class="toolbar">
  <button class="btn btn-refresh" onclick="loadData()">&#8635; Actualizar</button>
  <div class="search-wrap">
    <span class="si">&#9740;</span>
    <input type="text" id="search" placeholder="Buscar ticker..." oninput="applyFilters()">
  </div>
  <select id="sortSel" onchange="applySort()">
    <option value="weight">Peso %</option>
    <option value="chg">% cambio (mayor)</option>
    <option value="chg-asc">% cambio (menor)</option>
    <option value="ticker">Ticker A-Z</option>
    <option value="price">Precio</option>
  </select>
  <button class="btn active" id="btn-table" onclick="setView('table')">Tabla</button>
  <button class="btn" id="btn-map" onclick="setView('map')">Mapa de calor</button>
  <span class="status idle" id="status">Sin datos</span>
  <span class="ts" id="ts"></span>
</div>

<div class="summary">
  <div class="s-card"><div class="s-label">Subiendo</div><div class="s-val up" id="s-up">—</div></div>
  <div class="s-card"><div class="s-label">Bajando</div><div class="s-val dn" id="s-dn">—</div></div>
  <div class="s-card"><div class="s-label">Sin cambio</div><div class="s-val neu" id="s-flat">—</div></div>
  <div class="s-card"><div class="s-label">Mayor subida</div><div class="s-val up" id="s-top">—</div></div>
  <div class="s-card"><div class="s-label">Mayor caída</div><div class="s-val dn" id="s-bot">—</div></div>
</div>

<div id="table-view">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('ticker')" id="th-ticker">Ticker / Nombre</th>
        <th onclick="sortBy('weight')" id="th-weight" class="sorted">Peso %</th>
        <th onclick="sortBy('price')" id="th-price">Precio</th>
        <th onclick="sortBy('chg')" id="th-chg">% día</th>
        <th>Variación</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="map-view" style="display:none;">
  <div class="map-legend">
    <span>Tamaño = peso en QQQ &nbsp;·&nbsp; Color = % cambio hoy</span>
    <div class="legend-item"><div class="legend-sw" style="background:#00c896;"></div>Sube</div>
    <div class="legend-item"><div class="legend-sw" style="background:#ff4d6a;"></div>Baja</div>
    <div class="legend-item"><div class="legend-sw" style="background:#2a2d3a;"></div>Sin datos</div>
  </div>
  <canvas id="treemap-canvas" role="img" aria-label="Mapa de calor de holdings de QQQ"></canvas>
</div>

<div class="note" id="note"></div>

<script>
const HOLDINGS = [
  {t:'MSFT',n:'Microsoft',w:8.80},{t:'AAPL',n:'Apple',w:8.50},{t:'NVDA',n:'NVIDIA',w:8.20},
  {t:'AMZN',n:'Amazon',w:5.50},{t:'META',n:'Meta',w:5.10},{t:'GOOGL',n:'Alphabet A',w:4.20},
  {t:'GOOG',n:'Alphabet C',w:3.90},{t:'TSLA',n:'Tesla',w:3.50},{t:'AVGO',n:'Broadcom',w:3.30},
  {t:'COST',n:'Costco',w:2.60},{t:'NFLX',n:'Netflix',w:2.40},{t:'AMD',n:'AMD',w:1.90},
  {t:'ADBE',n:'Adobe',w:1.60},{t:'QCOM',n:'Qualcomm',w:1.50},{t:'INTC',n:'Intel',w:1.30},
  {t:'CSCO',n:'Cisco',w:1.30},{t:'PEP',n:'PepsiCo',w:1.20},{t:'TXN',n:'Texas Instruments',w:1.20},
  {t:'INTU',n:'Intuit',w:1.10},{t:'AMGN',n:'Amgen',w:1.10},{t:'AMAT',n:'Applied Materials',w:1.00},
  {t:'MU',n:'Micron',w:0.95},{t:'ISRG',n:'Intuitive Surgical',w:0.90},{t:'LRCX',n:'Lam Research',w:0.85},
  {t:'REGN',n:'Regeneron',w:0.80},{t:'ADI',n:'Analog Devices',w:0.78},{t:'PANW',n:'Palo Alto',w:0.75},
  {t:'KLAC',n:'KLA Corp',w:0.72},{t:'SNPS',n:'Synopsys',w:0.68},{t:'CDNS',n:'Cadence',w:0.65},
  {t:'CRWD',n:'CrowdStrike',w:0.63},{t:'MELI',n:'MercadoLibre',w:0.60},{t:'ASML',n:'ASML',w:0.58},
  {t:'ABNB',n:'Airbnb',w:0.55},{t:'WDAY',n:'Workday',w:0.52},{t:'FTNT',n:'Fortinet',w:0.50},
  {t:'PLTR',n:'Palantir',w:0.48},{t:'CTAS',n:'Cintas',w:0.46},{t:'ROP',n:'Roper Tech',w:0.44},
  {t:'DASH',n:'DoorDash',w:0.42},{t:'DXCM',n:'DexCom',w:0.40},{t:'MRVL',n:'Marvell Tech',w:0.38},
  {t:'AZN',n:'AstraZeneca',w:0.36},{t:'TEAM',n:'Atlassian',w:0.34},{t:'BIIB',n:'Biogen',w:0.32},
  {t:'GILD',n:'Gilead',w:0.30},{t:'VRTX',n:'Vertex',w:0.30},{t:'TTWO',n:'Take-Two',w:0.28},
  {t:'NXPI',n:'NXP Semi',w:0.26},{t:'FAST',n:'Fastenal',w:0.24},
];

let data = HOLDINGS.map(h => ({...h, price:null, chg:null}));
let currentSort = 'weight', currentView = 'table', filterText = '';

async function tryFetch(yahooUrl) {
  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`,
  ];
  for (const px of proxies) {
    try {
      const r = await fetch(px, {signal: AbortSignal.timeout(9000)});
      if (!r.ok) continue;
      const raw = await r.json();
      const text = raw.contents !== undefined ? raw.contents : JSON.stringify(raw);
      const parsed = JSON.parse(text);
      return parsed.quoteResponse.result;
    } catch(e) { continue; }
  }
  throw new Error('No se pudo conectar — revisá tu conexión a internet');
}

async function loadData() {
  const st = document.getElementById('status');
  st.textContent = 'Cargando...';
  st.className = 'status loading';
  document.getElementById('note').textContent = '';

  const allTickers = ['QQQ', ...HOLDINGS.map(h => h.t)];
  const batches = [];
  for (let i = 0; i < allTickers.length; i += 10) batches.push(allTickers.slice(i, i+10));

  try {
    const results = [];
    for (const batch of batches) {
      const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${batch.join(',')}&fields=regularMarketPrice,regularMarketChangePercent&lang=en-US&region=US`;
      const r = await tryFetch(url);
      results.push(...r);
      await new Promise(res => setTimeout(res, 120));
    }

    const qqq = results.find(q => q.symbol === 'QQQ');
    if (qqq) {
      document.getElementById('qqq-price').textContent = '$' + qqq.regularMarketPrice.toFixed(2);
      const c = qqq.regularMarketChangePercent;
      const el = document.getElementById('qqq-chg');
      el.textContent = (c >= 0 ? '+' : '') + c.toFixed(2) + '%';
      el.style.color = c >= 0 ? '#00c896' : '#ff4d6a';
    }
    results.forEach(q => {
      const row = data.find(d => d.t === q.symbol);
      if (row) { row.price = q.regularMarketPrice; row.chg = q.regularMarketChangePercent; }
    });

    const now = new Date();
    const ts = now.toLocaleTimeString('es-AR');
    const h = now.getUTCHours(), m = now.getUTCMinutes();
    const isOpen = (h > 13 || (h === 13 && m >= 30)) && h < 20;
    document.getElementById('ts').textContent = `Actualizado ${ts}`;
    document.getElementById('header-meta').innerHTML =
      `Mercado NY: <strong style="color:${isOpen?'#00c896':'#ffd060'}">${isOpen?'ABIERTO':'CERRADO'}</strong> &nbsp;·&nbsp; ${ts}`;
    document.getElementById('note').textContent = 'Datos via proxy público — pueden tener ~1 min de delay. Para datos directos abrí desde un servidor local (python -m http.server 8080).';

    st.textContent = 'Actualizado';
    st.className = 'status ok';
    render(); updateSummary();
    if (currentView === 'map') drawTreemap();

  } catch(e) {
    st.textContent = 'Error: ' + e.message;
    st.className = 'status err';
    document.getElementById('note').textContent = 'Tip: si el error persiste, abrí el archivo vía servidor local: python -m http.server 8080';
  }
}

function setView(v) {
  currentView = v;
  document.getElementById('table-view').style.display = v === 'table' ? '' : 'none';
  document.getElementById('map-view').style.display = v === 'map' ? '' : 'none';
  document.getElementById('btn-table').className = 'btn' + (v==='table'?' active':'');
  document.getElementById('btn-map').className = 'btn' + (v==='map'?' active':'');
  if (v === 'map') drawTreemap();
}

function sortBy(col) {
  document.getElementById('sortSel').value = col; currentSort = col;
  ['ticker','weight','price','chg'].forEach(c => { const e = document.getElementById('th-'+c); if(e) e.className = col===c?'sorted':''; });
  render();
}
function applySort() { currentSort = document.getElementById('sortSel').value; render(); }
function applyFilters() { filterText = document.getElementById('search').value.trim().toLowerCase(); render(); }

function getSorted() {
  let d = [...data];
  if (filterText) d = d.filter(r => r.t.toLowerCase().includes(filterText) || r.n.toLowerCase().includes(filterText));
  if (currentSort==='weight') d.sort((a,b)=>b.w-a.w);
  else if (currentSort==='chg') d.sort((a,b)=>(b.chg??-999)-(a.chg??-999));
  else if (currentSort==='chg-asc') d.sort((a,b)=>(a.chg??999)-(b.chg??999));
  else if (currentSort==='ticker') d.sort((a,b)=>a.t.localeCompare(b.t));
  else if (currentSort==='price') d.sort((a,b)=>(b.price??0)-(a.price??0));
  return d;
}

const fmtChg = v => v===null ? '<span class="chg-neu">—</span>' : `<span class="${v>0?'chg-pos':v<0?'chg-neg':'chg-neu'}">${v>0?'+':''}${v.toFixed(2)}%</span>`;
const fmtPrice = v => v===null ? '<span class="skel"></span>' : `$${v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const barHtml = chg => chg===null ? '<span class="chg-neu">—</span>' :
  `<div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${Math.min(Math.abs(chg)/5*100,100).toFixed(1)}%;background:${chg>=0?'#00c896':'#ff4d6a'};"></div></div></div>`;

function render() {
  const sorted = getSorted();
  const maxW = Math.max(...data.map(d=>d.w));
  document.getElementById('tbody').innerHTML = sorted.map(row => {
    const idx = data.indexOf(row)+1;
    return `<tr>
      <td><span class="rank">${idx}</span><span class="ticker-text">${row.t}</span><span class="wbar" style="width:${Math.round(row.w/maxW*55)}px;"></span><br><span class="name">${row.n}</span></td>
      <td><span style="color:var(--muted)">${row.w.toFixed(2)}%</span></td>
      <td>${fmtPrice(row.price)}</td>
      <td>${fmtChg(row.chg)}</td>
      <td>${barHtml(row.chg)}</td>
    </tr>`;
  }).join('');
}

function updateSummary() {
  const wd = data.filter(d=>d.chg!==null);
  document.getElementById('s-up').textContent = wd.filter(d=>d.chg>0).length;
  document.getElementById('s-dn').textContent = wd.filter(d=>d.chg<0).length;
  document.getElementById('s-flat').textContent = wd.filter(d=>d.chg===0).length;
  const top = wd.reduce((b,d)=>(!b||d.chg>b.chg)?d:b,null);
  const bot = wd.reduce((b,d)=>(!b||d.chg<b.chg)?d:b,null);
  document.getElementById('s-top').textContent = top ? `${top.t} +${top.chg.toFixed(2)}%` : '—';
  document.getElementById('s-bot').textContent = bot ? `${bot.t} ${bot.chg.toFixed(2)}%` : '—';
}

function drawTreemap() {
  const canvas = document.getElementById('treemap-canvas');
  const W = canvas.parentElement.offsetWidth || 800;
  const H = Math.round(W * 0.52);
  const dpr = window.devicePixelRatio||1;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);

  const items = [...data].filter(d=>d.w>0).sort((a,b)=>b.w-a.w);
  const totalW = items.reduce((s,d)=>s+d.w,0);

  function squarify(items,x,y,w,h) {
    if (!items.length) return [];
    const rects=[]; let rem=[...items];
    while(rem.length) {
      const isH=w>=h; let row=[],rs=0,best=Infinity;
      for(let i=0;i<rem.length;i++){
        row.push(rem[i]); rs+=rem[i].w;
        const ra=(rs/totalW)*w*h, side=isH?h:w;
        const ratio=Math.max((side*side*rem[i].w)/(ra*ra),(ra*ra)/(side*side*rem[i].w));
        if(ratio>best&&row.length>1){row.pop();break;} best=ratio;
      }
      rem=rem.slice(row.length);
      const rs2=row.reduce((s,d)=>s+d.w,0), rf=rs2/totalW;
      let cur=isH?y:x;
      row.forEach(item=>{
        const frac=item.w/rs2, rw=isH?w*rf:w*frac, rh=isH?h*frac:h*rf;
        const rx=isH?x:cur, ry=isH?cur:y;
        rects.push({...item,rx,ry,rw,rh}); cur+=isH?rh:rw;
      });
      if(isH){x+=w*rf;w-=w*rf;}else{y+=h*rf;h-=h*rf;}
    }
    return rects;
  }

  squarify(items,0,0,W,H).forEach(r=>{
    const c=r.chg;
    let fill = c===null?'#2a2d3a':c>0?`rgba(0,${Math.round(150+Math.min(c/5,1)*50)},${Math.round(100+Math.min(c/5,1)*50)},${0.3+Math.min(c/5,1)*0.65})`:`rgba(${Math.round(180+Math.min(Math.abs(c)/5,1)*75)},${Math.round(60-Math.min(Math.abs(c)/5,1)*40)},${Math.round(80-Math.min(Math.abs(c)/5,1)*40)},${0.3+Math.min(Math.abs(c)/5,1)*0.65})`;
    ctx.fillStyle=fill; ctx.fillRect(r.rx+1,r.ry+1,r.rw-2,r.rh-2);
    ctx.strokeStyle='#0f1117'; ctx.lineWidth=1.5; ctx.strokeRect(r.rx+1,r.ry+1,r.rw-2,r.rh-2);
    if(r.rw>38&&r.rh>24){
      const fs=Math.min(14,Math.max(9,r.rw/6));
      ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.font=`700 ${fs}px 'DM Mono',monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const cy=r.ry+r.rh/2;
      ctx.fillText(r.t, r.rx+r.rw/2, r.rh>44?cy-8:cy);
      if(r.rh>44&&c!==null){
        ctx.font=`400 ${Math.max(9,fs-3)}px 'DM Mono',monospace`;
        ctx.fillStyle='rgba(255,255,255,0.72)';
        ctx.fillText((c>=0?'+':'')+c.toFixed(2)+'%', r.rx+r.rw/2, cy+9);
      }
    }
  });
}

render();
</script>
</body>
</html>
